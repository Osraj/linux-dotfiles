# Colors matching swaylock theme
$font = Cantarell

general {
    hide_cursor = true
    grace = 3
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    vibrancy = 0.1
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(00aa84)
    inner_color = rgb(111826)
    font_color = rgb(ffffff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgb(82dccc)
    fail_color = rgb(01ccff)
    fail_text = <i>$FAIL</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(ffffff)
    font_size = 64
    font_family = $font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %d %B"
    color = rgb(ffffff)
    font_size = 20
    font_family = $font
    position = 0, 60
    halign = center
    valign = center
}
